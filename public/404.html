<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>404 - Strona nie znaleziona | Michal Kapusz</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080b18;
        color: #ffffff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(185, 214, 19, 0.16), transparent 32rem),
          linear-gradient(135deg, #080b18 0%, #11172a 100%);
      }

      main {
        width: min(100%, 560px);
        text-align: center;
      }

      p {
        margin: 0 0 28px;
        color: rgba(255, 255, 255, 0.68);
        line-height: 1.7;
      }

      .eyebrow {
        margin-bottom: 10px;
        color: #b9d613;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(36px, 8vw, 56px);
        line-height: 1.05;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: #b9d613;
        color: #080b18;
        padding: 0 24px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">404</div>
      <h1>Strona nie znaleziona</h1>
      <p>Ten adres nie istnieje albo zostal przeniesiony. Wroc na strone glowna i wybierz aktualna podstrone.</p>
      <a href="/">Strona glowna</a>
    </main>
  </body>
</html>
